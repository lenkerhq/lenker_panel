openapi: 3.0.3
info:
  title: Lenker Panel API
  version: 0.1.0-draft
  description: Draft OpenAPI contract for the currently implemented Lenker panel-api MVP v0.1 backend surface.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Plans
  - name: Subscriptions
  - name: Devices
  - name: Nodes
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
  /api/v1/auth/admin/login:
    post:
      tags: [Auth]
      summary: Authenticate a panel admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Admin authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/InactiveAdmin"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        "200":
          description: Users list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Users]
      summary: Get a user
      responses:
        "200":
          description: User details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Users]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{id}/suspend:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Users]
      summary: Suspend a user
      responses:
        "200":
          description: User suspended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/users/{id}/activate:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Users]
      summary: Activate a user
      responses:
        "200":
          description: User activated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/plans:
    get:
      tags: [Plans]
      summary: List plans
      responses:
        "200":
          description: Plans list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Plans]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Plan created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/plans/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Plans]
      summary: Get a plan
      responses:
        "200":
          description: Plan details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Plans]
      summary: Update a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanRequest"
      responses:
        "200":
          description: Plan updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/plans/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Plans]
      summary: Archive a plan
      responses:
        "200":
          description: Plan archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      responses:
        "200":
          description: Subscriptions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Subscriptions]
      summary: Create a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Subscriptions]
      summary: Get a subscription
      responses:
        "200":
          description: Subscription details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Subscriptions]
      summary: Update a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Subscription updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/access:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Subscriptions]
      summary: Get provider-side subscription access export
      responses:
        "200":
          description: Subscription access export for the single MVP VLESS Reality path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Subscription access export is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/access-token:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Subscriptions]
      summary: Get subscription access token lifecycle status
      description: Returns provider-side lifecycle metadata for the current subscription access token without returning plaintext token material.
      responses:
        "200":
          description: Subscription access token lifecycle status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAccessTokenStatusEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Subscriptions]
      summary: Issue a subscription access token
      description: Issues the one active subscription access token for this subscription. Any previous active token for the subscription is revoked before the new plaintext token is returned once.
      responses:
        "201":
          description: Plaintext subscription access token created. The database stores only a token hash.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAccessTokenEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Subscription access token cannot be created for this subscription state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Subscriptions]
      summary: Revoke the active subscription access token
      description: Revokes the current active subscription access token without returning token material. The operation is idempotent; never-issued subscriptions remain never_issued and already-revoked tokens remain revoked.
      responses:
        "200":
          description: Active subscription access token revoked or already absent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAccessTokenStatusEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/access-token/rotate:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Subscriptions]
      summary: Rotate the active subscription access token
      description: Revokes the previous active token and returns a new plaintext token once. If no token exists yet, rotation behaves as a fresh issue.
      responses:
        "201":
          description: Plaintext replacement subscription access token created. The database stores only a token hash.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAccessTokenEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Subscription access token cannot be rotated for this subscription state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/handoff-invite:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Subscriptions]
      summary: Get subscription handoff invite lifecycle status
      description: Returns provider-side lifecycle metadata for the latest client handoff invite without returning plaintext invite token material.
      responses:
        "200":
          description: Subscription handoff invite lifecycle status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionHandoffInviteStatusEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Subscriptions]
      summary: Issue a client handoff invite
      description: Issues a short-lived one-time handoff invite for the active subscription. Any previous active invite for the subscription is revoked before the new plaintext invite token is returned once.
      responses:
        "201":
          description: Plaintext handoff invite token created. The database stores only a token hash.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionHandoffInviteEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Handoff invite cannot be created for this subscription state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Subscriptions]
      summary: Revoke the active client handoff invite
      description: Revokes the current active handoff invite without returning token material. Already claimed, expired, revoked, or never-issued invites remain non-claimable.
      responses:
        "200":
          description: Active handoff invite revoked or already absent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionHandoffInviteStatusEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/renew:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Subscriptions]
      summary: Manually renew a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewSubscriptionRequest"
      responses:
        "200":
          description: Subscription renewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/client/handoff/claim:
    post:
      tags: [Subscriptions]
      summary: Claim a client handoff invite
      description: Consumer-facing bootstrap boundary for the current single MVP path. The one-time handoff token is exchanged for a subscription access token plus the redacted access payload. It does not use admin session auth and does not create a full user account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientHandoffClaimRequest"
      responses:
        "200":
          description: Handoff invite claimed and client access bootstrap payload returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientHandoffClaimEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Subscription access export is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/client/subscription-access:
    get:
      tags: [Subscriptions]
      summary: Read subscription access with a subscription access token
      description: Consumer-facing read boundary for the current single MVP VLESS Reality path. Uses Authorization Bearer subscription access tokens, not admin sessions.
      responses:
        "200":
          description: Redacted subscription access export.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientSubscriptionAccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Subscription access export is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes:
    get:
      tags: [Nodes]
      summary: List managed nodes
      responses:
        "200":
          description: Nodes list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/register:
    post:
      tags: [Nodes]
      summary: Register a node agent
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterNodeRequest"
      responses:
        "201":
          description: Node registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterNodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidBootstrapToken"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/bootstrap-token:
    post:
      tags: [Nodes]
      summary: Create a one-time node bootstrap token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeBootstrapTokenRequest"
      responses:
        "201":
          description: Bootstrap token created. The plaintext token is returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeBootstrapTokenEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: Get a managed node
      responses:
        "200":
          description: Node details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: List node config revisions
      description: Returns signed deterministic subscription-aware config payload metadata. This foundation does not control the Xray runtime.
      responses:
        "200":
          description: Config revisions list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Nodes]
      summary: Create signed config revision metadata
      description: Creates metadata for a deterministic subscription-aware VLESS Reality Xray config skeleton payload. It does not restart processes or execute rollback.
      responses:
        "201":
          description: Config revision metadata created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/pending:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Nodes]
      summary: Fetch latest pending config revision metadata for a node
      description: Node-agent endpoint. Requires the node Bearer token and returns only the latest pending signed config payload metadata for the node in the path. The agent serializes local artifacts before reporting applied; this endpoint does not control Xray.
      responses:
        "200":
          description: Latest pending config revision metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Node is unknown, token does not match, node is disabled, or no pending revision exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/{revisionId}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
        description: Config revision identifier.
    get:
      tags: [Nodes]
      summary: Get node config revision metadata
      responses:
        "200":
          description: Config revision metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/{revisionId}/rollback:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
        description: Applied config revision identifier to use as rollback source.
    post:
      tags: [Nodes]
      summary: Create rollback config revision metadata
      description: Admin endpoint. Creates a new pending revision from an applied target revision payload. The node-agent applies it through the normal polling path; panel-api does not mutate node files or restart Xray.
      responses:
        "201":
          description: Rollback config revision metadata created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/config-revisions/{revisionId}/report:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
        description: Config revision identifier.
    post:
      tags: [Nodes]
      summary: Report node config revision apply status
      description: Node-agent endpoint. Requires the node Bearer token and records applied or failed metadata status for a pending revision owned by the node. Applied means the node-agent verified hash/signature, passed the internal Xray compatibility validation gate, passed optional Xray binary dry-run validation when configured, and completed the local staged-to-active file switch. Failed reports keep node active_revision unchanged and may include compact reasons such as invalid_xray_config:missing_stream_settings or xray_dry_run_failed:invalid_config. This endpoint does not execute rollback or control Xray.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigRevisionReportRequest"
      responses:
        "200":
          description: Config revision status recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigRevisionEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/drain:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Mark a node as draining
      responses:
        "200":
          description: Node marked as draining.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/undrain:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Return a node to active drain state
      responses:
        "200":
          description: Node undrained.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/disable:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Disable a node
      responses:
        "200":
          description: Node disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/enable:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Enable a disabled node
      responses:
        "200":
          description: Node enabled as unhealthy until the next heartbeat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/nodes/{id}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Nodes]
      summary: Record a node heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeHeartbeatRequest"
      responses:
        "200":
          description: Heartbeat accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeHeartbeatEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/subscriptions/{id}/devices:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Devices]
      summary: List devices for a subscription
      responses:
        "200":
          description: Devices list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/devices/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Devices]
      summary: Get device detail
      responses:
        "200":
          description: Device detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Devices]
      summary: Revoke (delete) a device
      responses:
        "200":
          description: Device deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/devices/{id}/deactivate:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Devices]
      summary: Soft-deactivate a device
      responses:
        "200":
          description: Device deactivated.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/client/devices/register:
    post:
      tags: [Devices]
      summary: Register a client device
      description: Auth via Bearer subscription access token. Returns 403 if device_limit exceeded.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientDeviceRegisterRequest"
      responses:
        "200":
          description: Device registered or updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Device limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/client/devices/heartbeat:
    post:
      tags: [Devices]
      summary: Update device last_seen
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_fingerprint]
              properties:
                device_fingerprint:
                  type: string
      responses:
        "200":
          description: Heartbeat accepted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/client/devices/me:
    delete:
      tags: [Devices]
      summary: Delete current device
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_fingerprint]
              properties:
                device_fingerprint:
                  type: string
      responses:
        "200":
          description: Device deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: session-token
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier.
  responses:
    BadRequest:
      description: Invalid request body or validation failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid admin session token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidCredentials:
      description: Admin credentials are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InactiveAdmin:
      description: Admin account is inactive.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InvalidBootstrapToken:
      description: Node bootstrap token is invalid, expired, or already used.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data:
          description: Successful response payload.
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
    ErrorCode:
      type: string
      enum:
        - bad_request
        - unauthorized
        - not_found
        - validation_error
        - storage_error
        - internal_error
        - invalid_credentials
        - inactive_admin
        - invalid_bootstrap_token
        - expired_bootstrap_token
        - bootstrap_token_used
    HealthEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ok]
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AdminLoginEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [admin, session]
              properties:
                admin:
                  $ref: "#/components/schemas/Admin"
                session:
                  $ref: "#/components/schemas/AdminSession"
    Admin:
      type: object
      required: [id, email, status, two_factor_enabled, created_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, suspended]
        two_factor_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
    AdminSession:
      type: object
      required: [id, admin_id, token, expires_at, created_at]
      properties:
        id:
          type: string
        admin_id:
          type: string
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    User:
      type: object
      required: [id, email, status, display_name]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, suspended, expired]
        display_name:
          type: string
    UserEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"
    UserListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/User"
    CreateUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
    Plan:
      type: object
      required: [id, name, duration_days, device_limit, status]
      properties:
        id:
          type: string
        name:
          type: string
        duration_days:
          type: integer
          minimum: 1
        traffic_limit_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        device_limit:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [active, archived]
    PlanEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Plan"
    PlanListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Plan"
    CreatePlanRequest:
      type: object
      required: [name, duration_days, device_limit]
      properties:
        name:
          type: string
        duration_days:
          type: integer
          minimum: 1
        traffic_limit_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        device_limit:
          type: integer
          minimum: 1
    UpdatePlanRequest:
      type: object
      properties:
        name:
          type: string
        duration_days:
          type: integer
          minimum: 1
        traffic_limit_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        clear_traffic_limit:
          type: boolean
        device_limit:
          type: integer
          minimum: 1
    Subscription:
      type: object
      required:
        - id
        - user_id
        - plan_id
        - status
        - starts_at
        - expires_at
        - traffic_used_bytes
        - device_limit
      properties:
        id:
          type: string
        user_id:
          type: string
        plan_id:
          type: string
        status:
          type: string
          enum: [active, expired, suspended]
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        traffic_limit_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        traffic_used_bytes:
          type: integer
          format: int64
          minimum: 0
        device_limit:
          type: integer
          minimum: 1
        preferred_region:
          type: string
          nullable: true
    SubscriptionEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Subscription"
    SubscriptionListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Subscription"
    SubscriptionAccess:
      type: object
      required:
        - export_kind
        - subscription_id
        - user_id
        - user_label
        - plan_id
        - plan_name
        - status
        - protocol
        - protocol_path
        - node
        - endpoint
        - client
        - display_name
        - uri
      properties:
        export_kind:
          type: string
          enum: [subscription_access.v1alpha1]
        subscription_id:
          type: string
        user_id:
          type: string
        user_label:
          type: string
        plan_id:
          type: string
        plan_name:
          type: string
        status:
          type: string
          enum: [active]
        protocol:
          type: string
          enum: [vless-reality-xtls-vision]
        protocol_path:
          type: string
          enum: [vless-reality-xtls-vision]
        node:
          type: object
          required: [id, name, region, country_code, hostname, status, drain_state, active_revision]
          properties:
            id:
              type: string
            name:
              type: string
            region:
              type: string
            country_code:
              type: string
            hostname:
              type: string
            status:
              type: string
              enum: [active]
            drain_state:
              type: string
              enum: [active]
            active_revision:
              type: integer
        endpoint:
          type: object
          required: [address, port, network, security, sni, public_key, short_id, fingerprint, spider_x]
          properties:
            address:
              type: string
            port:
              type: integer
              minimum: 1
            network:
              type: string
              enum: [tcp]
            security:
              type: string
              enum: [reality]
            sni:
              type: string
            public_key:
              type: string
            short_id:
              type: string
            fingerprint:
              type: string
            spider_x:
              type: string
        client:
          type: object
          required: [id, email, flow, level, plan_id]
          properties:
            id:
              type: string
            email:
              type: string
            flow:
              type: string
              enum: [xtls-rprx-vision]
            level:
              type: integer
            plan_id:
              type: string
        display_name:
          type: string
        uri:
          type: string
    SubscriptionAccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionAccess"
    SubscriptionAccessToken:
      type: object
      description: Plaintext provider handoff token returned only by issue or rotate responses.
      required: [subscription_id, access_token, expires_at, created_at]
      properties:
        subscription_id:
          type: string
          example: "sub_123"
        access_token:
          type: string
          description: Plaintext token returned only by the create-token response.
          example: "lnksa_example_plaintext_token"
        expires_at:
          type: string
          format: date-time
          example: "2026-06-16T12:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-05-17T12:00:00Z"
    SubscriptionAccessTokenEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionAccessToken"
    SubscriptionAccessTokenStatus:
      type: object
      description: Provider-side token lifecycle status. It never includes plaintext token material.
      required: [subscription_id, status, issued, generation]
      properties:
        subscription_id:
          type: string
          example: "sub_123"
        status:
          type: string
          enum: [never_issued, active, revoked]
          example: active
        issued:
          type: boolean
          example: true
        issued_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-17T12:00:00Z"
        revoked_at:
          type: string
          format: date-time
          nullable: true
          example: null
        generation:
          type: integer
          example: 1
    SubscriptionAccessTokenStatusEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionAccessTokenStatus"
    SubscriptionHandoffInvite:
      type: object
      description: Plaintext one-time client handoff invite returned only by issue responses.
      required: [subscription_id, handoff_token, expires_at, created_at]
      properties:
        subscription_id:
          type: string
          example: "sub_123"
        handoff_token:
          type: string
          description: Plaintext handoff invite token returned only by the create-invite response.
          example: "lnkhi_example_plaintext_invite"
        expires_at:
          type: string
          format: date-time
          example: "2026-05-18T12:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-05-17T12:00:00Z"
    SubscriptionHandoffInviteEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionHandoffInvite"
    SubscriptionHandoffInviteStatus:
      type: object
      description: Provider-side handoff invite lifecycle status. It never includes plaintext invite token material.
      required: [subscription_id, status, issued, generation]
      properties:
        subscription_id:
          type: string
          example: "sub_123"
        status:
          type: string
          enum: [never_issued, active, claimed, revoked, expired]
          example: active
        issued:
          type: boolean
          example: true
        issued_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-17T12:00:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-18T12:00:00Z"
        claimed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        revoked_at:
          type: string
          format: date-time
          nullable: true
          example: null
        generation:
          type: integer
          example: 1
    SubscriptionHandoffInviteStatusEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionHandoffInviteStatus"
    ClientSubscriptionAccess:
      type: object
      required:
        - export_kind
        - subscription_id
        - status
        - protocol
        - protocol_path
        - plan_name
        - node
        - endpoint
        - client
        - display_name
        - uri
      properties:
        export_kind:
          type: string
          enum: [subscription_access.v1alpha1]
        subscription_id:
          type: string
        status:
          type: string
          enum: [active]
        protocol:
          type: string
          enum: [vless-reality-xtls-vision]
        protocol_path:
          type: string
          enum: [vless-reality-xtls-vision]
        plan_name:
          type: string
        node:
          $ref: "#/components/schemas/SubscriptionAccess/properties/node"
        endpoint:
          $ref: "#/components/schemas/SubscriptionAccess/properties/endpoint"
        client:
          type: object
          required: [id, email, flow, level]
          properties:
            id:
              type: string
            email:
              type: string
            flow:
              type: string
              enum: [xtls-rprx-vision]
            level:
              type: integer
        display_name:
          type: string
        uri:
          type: string
    ClientSubscriptionAccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ClientSubscriptionAccess"
    ClientHandoffClaimRequest:
      type: object
      required: [handoff_token]
      properties:
        handoff_token:
          type: string
          example: "lnkhi_example_plaintext_invite"
    ClientHandoffClaim:
      type: object
      required:
        - claim_kind
        - subscription_id
        - access_token
        - access_token_expires_at
        - claimed_at
        - access
      properties:
        claim_kind:
          type: string
          enum: [subscription_handoff_claim.v1alpha1]
        subscription_id:
          type: string
        access_token:
          type: string
          description: Plaintext subscription access token returned to the consumer after a successful one-time handoff claim.
          example: "lnksa_example_plaintext_token"
        access_token_expires_at:
          type: string
          format: date-time
        claimed_at:
          type: string
          format: date-time
        access:
          $ref: "#/components/schemas/ClientSubscriptionAccess"
    ClientHandoffClaimEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ClientHandoffClaim"
    CreateSubscriptionRequest:
      type: object
      required: [user_id, plan_id]
      properties:
        user_id:
          type: string
        plan_id:
          type: string
        preferred_region:
          type: string
          nullable: true
    UpdateSubscriptionRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, expired, suspended]
        traffic_limit_bytes:
          type: integer
          format: int64
          minimum: 1
          nullable: true
        clear_traffic_limit:
          type: boolean
        device_limit:
          type: integer
          minimum: 1
        preferred_region:
          type: string
          nullable: true
        clear_preferred_region:
          type: boolean
    RenewSubscriptionRequest:
      type: object
      required: [extend_days]
      properties:
        extend_days:
          type: integer
          minimum: 1
    CreateNodeBootstrapTokenRequest:
      type: object
      properties:
        name:
          type: string
        region:
          type: string
        country_code:
          type: string
        hostname:
          type: string
        expires_in_minutes:
          type: integer
          minimum: 1
          maximum: 10080
          default: 30
    NodeBootstrapToken:
      type: object
      required: [id, node_id, bootstrap_token, expires_at]
      properties:
        id:
          type: string
        node_id:
          type: string
        bootstrap_token:
          type: string
          description: Plaintext one-time bootstrap token. It is returned only in this response.
        expires_at:
          type: string
          format: date-time
    NodeBootstrapTokenEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/NodeBootstrapToken"
    NodeSummary:
      type: object
      required: [id, name, region, status, drain_state, active_revision_id]
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        status:
          type: string
          enum: [pending, active, unhealthy, drained, disabled]
        drain_state:
          type: string
          enum: [active, draining, drained]
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        registered_at:
          type: string
          format: date-time
          nullable: true
        agent_version:
          type: string
        active_revision_id:
          type: integer
          minimum: 0
        runtime_mode:
          type: string
          description: Node-agent runtime supervision mode. MVP defaults to no-process or dry-run-only; no daemon is managed yet.
          enum: [no-process, dry-run-only, future-process-managed]
        runtime_process_mode:
          type: string
          description: Explicit node-agent local process runner gate. Default is disabled; local is an opt-in skeleton and does not ship daemon lifecycle management.
          enum: [disabled, local]
        runtime_process_state:
          type: string
          description: Latest process runner capability/preparation state. Disabled means no process control was attempted.
          enum: [disabled, ready, failed]
        runtime_desired_state:
          type: string
          description: Desired local runtime preparation state, currently validated-config-ready.
        runtime_state:
          type: string
          description: Latest local runtime preparation state reported by node-agent.
          enum: [not_prepared, active_config_ready, validation_failed, prepare_failed]
        last_dry_run_status:
          type: string
          enum: [not_configured, passed, failed]
        last_runtime_attempt_status:
          type: string
          enum: [skipped, ready, failed]
        last_runtime_prepared_revision:
          type: integer
          minimum: 0
        last_runtime_transition_at:
          type: string
          format: date-time
          nullable: true
        last_runtime_error:
          type: string
          description: Compact runtime preparation error, empty after successful no-process preparation.
        last_validation_status:
          type: string
          description: Latest node-agent config validation/apply result, empty when no validation has been reported yet.
          enum: ["", applied, failed]
        last_validation_error:
          type: string
          description: Compact latest validation/apply failure reason, empty after a successful apply or before first validation.
        last_validation_at:
          type: string
          format: date-time
          nullable: true
        last_applied_revision:
          type: integer
          minimum: 0
        active_config_path:
          type: string
          description: Node-local active config artifact path reported by node-agent.
    RuntimeEvent:
      type: object
      description: Compact node-agent runtime event retained as a bounded recent trail per node.
      properties:
        type:
          type: string
          enum: [apply_success, apply_failure, validation_failure, dry_run_failure, process_prepare_start_intent, runtime_event]
        status:
          type: string
          enum: ["", applied, failed, ready]
        revision_number:
          type: integer
          minimum: 0
        message:
          type: string
          maxLength: 240
        runtime_mode:
          type: string
          enum: [no-process, dry-run-only, future-process-managed]
        runtime_process_mode:
          type: string
          enum: [disabled, local]
        runtime_process_state:
          type: string
          enum: [disabled, ready, failed]
        at:
          type: string
          format: date-time
